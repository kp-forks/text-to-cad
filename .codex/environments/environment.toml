# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "text-to-cad"

[setup]
script = '''
set -euo pipefail

repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"

if [ -x scripts/dev/setup-symlinks.sh ]; then
  scripts/dev/setup-symlinks.sh --check || scripts/dev/setup-symlinks.sh
fi

# Offline only: hydrate from the local shared LFS cache. This does not download.
if git lfs version >/dev/null 2>&1; then
  git lfs checkout models || true
fi

if command -v rg >/dev/null 2>&1 \
  && rg -q "version https://git-lfs.github.com/spec/v1" models; then
  echo "Some models are still LFS pointers; local LFS cache is missing objects."
  echo 'To download them explicitly, run: git lfs pull --include="models/**" --exclude=""'
fi
'''

[cleanup]
script = '''
set -euo pipefail

repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
cd "$repo_root"

# Keep hydrated models and .git/lfs/objects intact for future offline setup.
# No teardown is required for repo-local CAD fixtures.
:
'''
